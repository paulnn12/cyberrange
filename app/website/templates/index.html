<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
<div class="container">
  <h1>// prompt</h1>

  <div class="field">
    <label>backend</label>
    <select id="backend" onchange="toggleBackend()">
      <option value="anthropic">anthropic</option>
      <option value="ollama">ollama</option>
    </select>
  </div>

  <div id="ollama-section">
    <div class="row">
      <div class="field">
        <label>ip</label>
        <input id="ollama-ip" placeholder="192.168.1.10" />
      </div>
      <div class="field">
        <label>port</label>
        <input id="ollama-port" placeholder="11434" value="11434" />
      </div>
    </div>
    <div class="field">
      <label>model</label>
      <input id="ollama-model" placeholder="llama3" />
    </div>
  </div>

  <div class="field">
    <label>prompt <span style="color:#333">— Ctrl+Enter to send</span></label>
    <textarea id="prompt" placeholder="…"></textarea>
  </div>

  <button id="send-btn" onclick="sendPrompt()">send</button>
  <button id="dl-script-btn" style="display:none" onclick="downloadScript()">download .sh</button>
  <button id="dl-dir-btn"    style="display:none" onclick="downloadDir()">download docker config</button>

  <div id="status"></div>
  <pre id="script-output"></pre>

  <div id="exec-block">
    <div class="block-label">execution output</div>
    <pre id="exec-output"></pre>
  </div>
</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
