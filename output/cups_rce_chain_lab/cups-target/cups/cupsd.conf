# CUPS daemon configuration for vulnerable PrintMaster Pro lab
# Listens on all interfaces (required for the lab target to be reachable)
Listen 0.0.0.0:631
Listen /run/cups/cups.sock

# Allow browsing advertisements
Browsing On
BrowseLocalProtocols dnssd

# Log level
LogLevel debug

# Allow access from any host (lab environment — not a production setting)
<Location />
  Order allow,deny
  Allow all
</Location>

<Location /admin>
  Order allow,deny
  Allow all
</Location>

<Location /admin/conf>
  AuthType Default
  Require user @SYSTEM
  Order allow,deny
  Allow all
</Location>

DefaultEncryption Never
