services:

  db:
    image: mysql:8.0.36
    container_name: nexusbank_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: n3xus_r00t_2024
      MYSQL_DATABASE: nexusbank
      MYSQL_USER: nexus_app
      MYSQL_PASSWORD: nexus_app_p@ss
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - lab_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-pn3xus_r00t_2024"]
      interval: 5s
      timeout: 4s
      retries: 15

  app1:
    build: ./app1
    image: nexusbank-portal:1.0
    container_name: nexusbank_portal
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: nexus_app
      DB_PASS: nexus_app_p@ss
      DB_NAME: nexusbank
    networks:
      - lab_net

  app2:
    build: ./app2
    image: nexusbank-reporting:1.0
    container_name: nexusbank_reporting
    restart: unless-stopped
    ports:
      - "8082:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: nexus_app
      DB_PASS: nexus_app_p@ss
      DB_NAME: nexusbank
    networks:
      - lab_net

  app3:
    build: ./app3
    image: nexusbank-trading:1.0
    container_name: nexusbank_trading
    restart: unless-stopped
    ports:
      - "8083:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: nexus_app
      DB_PASS: nexus_app_p@ss
      DB_NAME: nexusbank
    networks:
      - lab_net

networks:
  lab_net:
    driver: bridge

volumes:
  db_data:
